name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: pdo, json
    - name: Install deps
      run: composer install --no-interaction || true
    - name: Run PHPUnit
      run: php vendor/bin/phpunit || true
    - name: Syntax check
      run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;
