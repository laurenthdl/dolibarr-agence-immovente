name: Tests immovente

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2', '8.4']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dolibarr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: pdo, pdo_pgsql, mbstring, json
        coverage: xdebug

    - name: Validate composer.json
      run: composer validate --strict || true

    - name: Install dependencies
      run: |
        if [ -f composer.json ]; then composer install --prefer-dist --no-progress; fi

    - name: Run PHPUnit tests
      run: |
        if [ -f test/phpunit/ImmoventeTest.php ]; then
          php test/phpunit/ImmoventeTest.php
        fi
      env:
        DB_TYPE: pgsql
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: dolibarr_test
        DB_USER: postgres
        DB_PASS: postgres

    - name: Run PHP syntax check
      run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;
